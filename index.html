<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Wisuda Unigha</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f4f4; }
        iframe { border: none; width: 100%; height: 100vh; display: block; }
    </style>
</head>
<body>
    <iframe id="mainFrame" src=""></iframe>

    <script>
        // Masukkan link Google Script kamu di sini
        const BASE_GAS_URL = "https://script.google.com/a/macros/mhs.unimal.ac.id/s/AKfycbyuTmchZAfw8HtZmytkMKiH8GJBPwTEHpTytyBi1r8J/exec";

        // Mengambil parameter ?page= dari URL browser
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page') || 'home';

        // Gabungkan dan tampilkan di Iframe
        document.getElementById('mainFrame').src = BASE_GAS_URL + "?page=" + page;
    </script>
</body>
</html>
